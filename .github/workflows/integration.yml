# Integration Tests workflow
# Runs integration tests with local Mattermost and Slack mock servers

name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Pin Bun to a known version so a Bun release can't silently break CI.
  # Bump in lockstep with .github/workflows/ci.yml.
  BUN_VERSION: 1.3.3

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        platform: [mattermost, slack]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mmuser
          POSTGRES_PASSWORD: mmuser_password
          POSTGRES_DB: mattermost
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      # Mattermost setup (only for mattermost platform)
      - name: Start Mattermost
        if: matrix.platform == 'mattermost'
        run: |
          # team-edition 10.11.15 — extended LTS line. We were previously on 9.11
          # which carried a thread-write race (MM-39713 / MM-46916) that fired
          # on every test where the bot streamed multiple posts to the same
          # thread, surfacing as a flood of 500 "duplicate key value violates
          # unique constraint threads_pkey" responses on POST /posts. Fixed
          # upstream in 9.5+; we hold on the LTS line to track local compose.
          docker run -d \
            --name mattermost \
            --network host \
            -e MM_SQLSETTINGS_DRIVERNAME=postgres \
            -e MM_SQLSETTINGS_DATASOURCE="postgres://mmuser:mmuser_password@localhost:5432/mattermost?sslmode=disable" \
            -e MM_SERVICESETTINGS_SITEURL=http://localhost:8065 \
            -e MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION=true \
            -e MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS=true \
            -e MM_TEAMSETTINGS_ENABLEOPENSERVER=true \
            -e MM_LOGSETTINGS_CONSOLELEVEL=ERROR \
            -e MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS=false \
            -e MM_RATELIMITSETTINGS_ENABLE=false \
            mattermost/mattermost-team-edition:10.11.15

      - name: Wait for Mattermost to be ready
        if: matrix.platform == 'mattermost'
        run: |
          echo "Waiting for Mattermost to start..."
          timeout 180 bash -c '
            until curl -sf http://localhost:8065/api/v4/system/ping; do
              echo "Waiting..."
              sleep 5
            done
          '
          echo "Mattermost is ready!"

      - name: Setup Mattermost (create users, channels, bot)
        if: matrix.platform == 'mattermost'
        run: bun run tests/integration/setup/setup-mattermost.ts
        env:
          MATTERMOST_URL: http://localhost:8065

      # Slack mock server setup (only for slack platform)
      - name: Start Slack Mock Server
        if: matrix.platform == 'slack'
        run: bun run tests/integration/fixtures/slack/start-mock-server.ts &
        env:
          SLACK_MOCK_PORT: 3457

      - name: Wait for Slack Mock Server to be ready
        if: matrix.platform == 'slack'
        run: |
          echo "Waiting for Slack mock server to start..."
          timeout 30 bash -c '
            until curl -sf -X POST http://localhost:3457/api/api.test; do
              echo "Waiting..."
              sleep 1
            done
          '
          echo "Slack mock server is ready!"

      # Run integration tests — ONE process per suite file.
      #
      # The bot/session/sticky layer keeps module-level global state
      # (stickyPostIds, the session registry, the bot pool cursor) and live
      # WebSocket connections. Bun runs all suite files in a single process, so
      # a bot whose WebSocket isn't fully torn down in one suite keeps
      # processing events (and posting "Bot Offline" stickies, resuming stale
      # sessions) into the next suite — which made the sticky suite flaky. A
      # per-test cleanup audit across 21 suites is fragile; running each file in
      # its own process makes process exit clear all of that by construction, so
      # no state can leak between suites.
      #
      # Per-test cap: 120s. Some tests (Skip Permissions, Tool Use Display)
      # take 60-90s in CI under Mattermost retry pressure.
      - name: Run integration tests
        run: |
          set -uo pipefail
          failed=0
          for suite in tests/integration/suites/*.test.ts; do
            echo "::group::$suite"
            if ! bun test "$suite" --timeout 120000; then
              echo "❌ $suite failed"
              failed=1
            fi
            echo "::endgroup::"
          done
          if [ "$failed" -ne 0 ]; then
            echo "One or more integration suites failed."
            exit 1
          fi
        env:
          MATTERMOST_URL: http://localhost:8065
          SLACK_MOCK_URL: http://localhost:3457/api
          SLACK_MOCK_PORT: 3457
          INTEGRATION_TEST: "1"
          TEST_PLATFORMS: ${{ matrix.platform }}

      # Cleanup and logs
      - name: Collect Mattermost logs on failure
        if: failure() && matrix.platform == 'mattermost'
        run: docker logs mattermost > mattermost.log 2>&1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-logs-${{ matrix.platform }}
          path: |
            mattermost.log
          retention-days: 5

      - name: Stop Mattermost
        if: always() && matrix.platform == 'mattermost'
        run: |
          docker stop mattermost || true
          docker rm mattermost || true
