name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run security scan daily at 6 AM UTC
    - cron: "0 6 * * *"

env:
  # Pin Bun to a known version so a Bun release can't silently break CI.
  # Bump in lockstep with what's developed against locally.
  BUN_VERSION: 1.3.3

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          format: "table"

      - name: Run bun audit
        run: bun audit --audit-level=high --ignore GHSA-3ppc-4f35-3m26 --ignore GHSA-7r86-cg39-jmmj --ignore GHSA-23c5-xmqv-rm74

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - name: Run ESLint
        run: bun run lint

      - name: Run Knip
        run: bunx knip --no-config-hints

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - name: Type check
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - name: Run tests with coverage
        id: coverage
        run: |
          # Run tests and capture coverage output
          # Use pipefail to ensure test failures are not masked by tee
          set -o pipefail
          bun test src/ --coverage 2>&1 | tee coverage-output.txt

          # Extract line coverage from "All files" row (column 6 is line coverage %)
          COVERAGE=$(grep "All files" coverage-output.txt | awk '{print $6}' | sed 's/%//' | cut -d'.' -f1)

          if [ -z "$COVERAGE" ]; then
            echo "❌ Could not extract coverage percentage"
            exit 1
          fi

          echo "Line coverage: ${COVERAGE}%"
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

          # Enforce minimum coverage threshold (80%)
          if [ "$COVERAGE" -lt 80 ]; then
            echo "❌ Coverage ${COVERAGE}% is below threshold of 80%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets threshold of 80%"

      - name: Upload coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.coverage }}%
          valColorRange: ${{ steps.coverage.outputs.coverage }}
          maxColorRange: 100
          minColorRange: 0

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - run: bun run build

      - name: Verify dist files exist
        run: |
          test -f dist/index.js
          test -f dist/mcp/permission-server.js

      - name: Smoke test - verify binary starts
        run: bun dist/index.js --help

  # The published binary runs under Node, not Bun. Smoke-test under each
  # currently-supported Node line so we catch accidental use of an API that
  # only exists on newer Node, which would silently break users on the floor.
  # Floor (20) is what publish.yml builds against. 22 and 24 are active LTS
  # and current LTS as of 2026-04.
  node-smoke:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: bun install
      - run: bun run build

      - name: Smoke test under Node ${{ matrix.node-version }}
        run: |
          node --version
          node dist/index.js --help
          node dist/index.js --version
          node dist/mcp/permission-server.js --help || true
